services:
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    image: qwen-asr-postgres:dev
    container_name: qwen-asr-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qwasr}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-qwen_asr}
      PGDATA: /var/lib/postgresql/data/pgdata
    # M1 開發階段暴露 host port 供本機 psql 除錯；production 應透過 docker-compose.override.yml 移除
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qwasr} -d ${POSTGRES_DB:-qwen_asr}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  asr-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
      args:
        INSTALL_GPU_DEPS: ${INSTALL_GPU_DEPS:-false}
        INSTALL_AUDIO_DEPS: ${INSTALL_AUDIO_DEPS:-false}
        INSTALL_YOUTUBE_DEPS: ${INSTALL_YOUTUBE_DEPS:-false}
    image: qwen-asr-backend:dev
    container_name: qwen-asr-backend
    environment:
      # 必填
      API_KEY: ${API_KEY:?API_KEY is required}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://qwasr:${DB_PASSWORD}@postgres:5432/qwen_asr}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      THIRD_PARTY_LICENSE_ACK: ${THIRD_PARTY_LICENSE_ACK:?must be true to start}
      ENV: ${ENV:-development}
      DEPLOYMENT_PROFILE: ${DEPLOYMENT_PROFILE:-client}
      # 模型與 vLLM
      ASR_MODEL: ${ASR_MODEL:-Qwen/Qwen3-ASR-1.7B}
      MODEL_CACHE_DIR: /data/models
      BACKEND_TYPE: vllm
      VLLM_GPU_MEMORY_UTILIZATION: ${VLLM_GPU_MEMORY_UTILIZATION:-0.5}
      GPU_DEVICE: ${GPU_DEVICE:-cuda:0}
      MAX_INFERENCE_BATCH: ${MAX_INFERENCE_BATCH:-32}
      ASR_MAX_TOKENS: ${ASR_MAX_TOKENS:-4096}
      ASR_REQUEST_TIMEOUT_SEC: ${ASR_REQUEST_TIMEOUT_SEC:-1200}
      ASR_AUDIO_MAX_DURATION_SEC: ${ASR_AUDIO_MAX_DURATION_SEC:-1200}
      # 音檔處理
      AUDIO_STORAGE_DIR: /data/audio
      VAD_ENABLED: ${VAD_ENABLED:-true}
      VAD_MODEL_DIR: /data/models/FireRedVAD
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-100}
      MAX_DECODE_SIZE_MB: ${MAX_DECODE_SIZE_MB:-500}
      SUPPORTED_AUDIO_FORMATS: ${SUPPORTED_AUDIO_FORMATS:-wav,mp3,mp4,flac,aac,ogg,m4a}
      # 語者分離（vendor profile）：HF_TOKEN 用於 pyannote 模型授權下載
      # 留空時 DiarizationService 會跳過載入並在 log 留 warning，不阻止啟動
      DIARIZATION_ENABLED: ${DIARIZATION_ENABLED:-true}
      DIARIZATION_BACKEND: ${DIARIZATION_BACKEND:-pyannote}
      HF_TOKEN: ${HF_TOKEN:-}
      # 佇列
      QUEUE_BATCH_MAX_SIZE: ${QUEUE_BATCH_MAX_SIZE:-20}
      QUEUE_REALTIME_MAX_SIZE: ${QUEUE_REALTIME_MAX_SIZE:-50}
      QUEUE_REJECT_BEHAVIOR: ${QUEUE_REJECT_BEHAVIOR:-reject}
      # 可觀測性
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      # 安全與 CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-false}
      OPENAPI_DOCS_ENABLED: ${OPENAPI_DOCS_ENABLED:-true}
      OPENAPI_DOCS_REQUIRE_AUTH: ${OPENAPI_DOCS_REQUIRE_AUTH:-false}  # production 必須設為 true 以保護 API schema
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ${MODEL_CACHE_DIR_HOST:-./.data/models}:/data/models
      - ${AUDIO_STORAGE_DIR_HOST:-./.data/audio}:/data/audio
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # GPU runtime（Phase 2 vendor profile 啟用；Phase 1 client profile 可忽略）
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    image: qwen-asr-frontend:dev
    container_name: qwen-asr-frontend
    environment:
      # /api/* rewrites go through Next.js dev server, which forwards to this URL
      # using Docker's internal DNS (asr-backend → backend container).
      BACKEND_BASE_URL: ${FRONTEND_BACKEND_BASE_URL:-http://asr-backend:8000}
      # vendor profile shows the full sidebar (incl. Fine-tune submenu).
      NEXT_PUBLIC_DEPLOYMENT_PROFILE: ${NEXT_PUBLIC_DEPLOYMENT_PROFILE:-vendor}
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      # Bind mount source from host so `git pull` on the host is enough to update
      # the running dev server (Next.js Fast Refresh picks it up via polling).
      - ./frontend:/app
      # Named volumes for node_modules and .next so the host's Windows-built
      # artefacts (if any) don't leak into the Linux container.
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    depends_on:
      asr-backend:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
    name: qwen-asr-pgdata
  frontend_node_modules:
    name: qwen-asr-frontend-node-modules
  frontend_next_cache:
    name: qwen-asr-frontend-next-cache
